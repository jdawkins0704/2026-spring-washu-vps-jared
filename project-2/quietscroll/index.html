<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Look at Me Like You Love Me | Quiet Scroll</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="hero" role="banner">
    <div class="hero__media" aria-hidden="true"></div>
    <div class="hero__overlay">
      <div class="hero__text">
        <h1 class="hero__title">
          look at me like you <span class="hero__titleEm">love me</span>
        </h1>
        <p class="hero__credit">Photographs by Jess T. Dugan</p>
      </div>
    </div>
  </header>

  <main class="page" id="main">
    <section class="intro">
      <div class="intro__wrap">
        <p class="intro__quote">hold me here in this light.</p>
      </div>
    </section>

    <section class="gallery" aria-label="Selected moments">
      <div class="gallery__wrap">

        <figure class="frame frame--small frame--top">
          <a class="frame__link" href="intimacy.html">
            <img src="images/moment-1.webp" alt="A photograph representing intimacy.">
          </a>
        </figure>

        <figure class="frame frame--tall frame--middle">
          <a class="frame__link" href="vulnerability.html">
            <img src="images/moment-2.webp" alt="A photograph representing vulnerability.">
          </a>
        </figure>

        <figure class="frame frame--wide frame--hands">
          <a class="frame__link" href="touch.html">
            <img src="images/moment-3.webp" alt="A photograph representing touch.">
          </a>
        </figure>

        <figure class="frame frame--wide frame--bottom">
          <a class="frame__link" href="distance.html">
            <img src="images/moment-4.webp" alt="A photograph representing distance.">
          </a>
        </figure>

        <p class="captionText">stare into the depths of my soul.</p>
      </div>
    </section>

    <section class="closing">
      <p class="closing__line">All the ways we let ourselves be seen.</p>
    </section>
  </main>

  <footer class="footer">
    <nav class="footer__nav" aria-label="footer">
      <a href="index.html" aria-current="page">Home</a>
      <a href="intimacy.html">Intimacy</a>
      <a href="vulnerability.html">Vulnerability</a>
      <a href="touch.html">Touch</a>
      <a href="distance.html">Distance</a>
    </nav>
    <p class="footer__tiny">© Look at Me Like You Love Me</p>
  </footer>
</body>
</html>
